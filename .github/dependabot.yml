version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    ignore:
      - dependency-name: "python"
        versions:
          - "*.pre.alpine.*"   # all pre-releases (alpha/beta/rc) for alpine variants
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
