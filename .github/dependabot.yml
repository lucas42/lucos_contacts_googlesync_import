version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    ignore:
      - dependency-name: "python"
        versions:
          - "*.pre.alpine.a"                        # alpha (e.g. 3.15.0a2-alpine)
          - ">= 3.15.0b1.pre.alpine.b, < 3.15.1"   # beta range probe (glob *.pre.alpine.b empirically ineffective — lucos_contacts_googlesync_import#203)
          - "*.pre.alpine.rc*"                       # rc    (e.g. 3.15.0rc1-alpine)
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:00'
    allow:
      - dependency-type: all
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      major:
        update-types:
          - major
