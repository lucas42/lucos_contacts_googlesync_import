version: 2.1
orbs:
  lucos: lucos/deploy@0
jobs:
  test:
    docker:
      - image: cimg/python:3.13
    steps:
      - checkout
      - run:
          name: Install Dependencies
          command: pipenv install
      - run:
          name: Run Tests
          command: pipenv run python3 test_import.py
workflows:
  version: 2
  build-deploy:
    jobs:
      - test
      - lucos/build:
          serial-group: << pipeline.project.slug >>/build/<< pipeline.git.branch >>
      - lucos/deploy-avalon:
          serial-group: deploy-avalon
          requires:
            - test
            - lucos/build
          filters:
            branches:
              only:
                - main
